function ss(){G={tf:2+Math.random()*7|0,tp:Math.random()*10|0,f:5,p:5,n:4,t:18,s:0,r:1,just:new Set()}}function acc(){return Math.max(0,100-Math.abs(G.tf-G.f)*13-Math.abs(G.tp-G.p)*8-G.n*3)}function us(dt){G.t-=dt;if(G.t<=0)return over(G.s,'SIGNAL LOST');if(press('ArrowLeft'))G.f=Math.max(1,G.f-1);if(press('ArrowRight'))G.f=Math.min(9,G.f+1);if(press('ArrowDown'))G.p=Math.max(0,G.p-1);if(press('ArrowUp'))G.p=Math.min(9,G.p+1);if(press('KeyB'))G.n=Math.max(0,G.n-1);if(press('KeyA')){let a=acc();if(a<35)return over(G.s,'SIGNAL COLLAPSED');G.s+=a+G.r*7|0;G.r++;G.tf=1+Math.random()*9|0;G.tp=Math.random()*10|0;G.t=18;A.beep(1000)}E.hud.textContent=`ROUND ${G.r} · LOCK ${acc()}% · SCORE ${G.s}`;eat()}function wave(x,f,p,b){return b+Math.sin(x*f*.055+p*.7)*34}function ds(){base();text('TARGET',35,100);text('PLAYER',35,330);c.strokeStyle='#eee9dc';c.lineWidth=3;c.beginPath();for(let x=40;x<860;x+=4){let y=wave(x,G.tf,G.tp,200);x===40?c.moveTo(x,y):c.lineTo(x,y)}c.stroke();c.strokeStyle='#e6a813';c.beginPath();for(let x=40;x<860;x+=4){let y=wave(x,G.f,G.p,415)+(Math.random()-.5)*G.n*4;x===40?c.moveTo(x,y):c.lineTo(x,y)}c.stroke();text(`F ${G.f} · PHASE ${G.p}`,40,515);text(`TIME ${Math.ceil(G.t)}`,850,515,18,'right')}
function sf(){G={y:280,v:0,x:900,gap:180,gy:140,s:0,just:new Set()}}function uf(dt){if(press('KeyA')||press('ArrowUp'))G.v=-300;G.v+=620*dt;G.y+=G.v*dt;G.x-=210*dt;G.s+=dt*4;if(G.x<-70){G.x=930;G.gy=70+Math.random()*260;G.s+=20;A.beep(1100)}if(G.y<55||G.y>510)return over(G.s,'EMBER LOST');if(155+55>G.x&&155<G.x+70&&(G.y<G.gy||G.y+34>G.gy+G.gap))return over(G.s,'EMBER LOST');E.hud.textContent=`SCORE ${G.s|0}`;eat()}function df(){base();c.fillStyle='#1b1e1b';for(let i=0;i<18;i++){let x=(i*83+G.s*4)%900,h=80+(i*47)%280;c.fillRect(x,560-h,40,h)}c.fillStyle='#eee9dc';c.save();c.translate(155,G.y);c.beginPath();c.moveTo(-25,0);c.lineTo(-50,-25);c.lineTo(-10,-12);c.lineTo(10,-30);c.lineTo(55,0);c.lineTo(10,30);c.lineTo(-10,14);c.lineTo(-50,26);c.closePath();c.fill();c.restore();c.fillStyle='#292c29';c.fillRect(G.x,52,70,G.gy-52);c.fillRect(G.x,G.gy+G.gap,70,510-G.gy-G.gap)}
function sd(){G={f:1,h:5,k:1,l:3,s:0,ch:0,doors:[roll(),roll()],msg:'CHOOSE A DOOR',just:new Set()}}function roll(){let a=['EMPTY','HEAL','TRAP','KEY','LOCKED','SHADOW','LANTERN','RELIC'];return a[Math.random()*a.length|0]}function ud(){if(press('ArrowLeft'))G.ch=0;if(press('ArrowRight'))G.ch=1;if(press('KeyA')){let x=G.doors[G.ch];if(x==='HEAL')G.h=Math.min(9,G.h+1);if(x==='TRAP')G.h--;if(x==='KEY')G.k++;if(x==='LOCKED')G.k?G.k--:G.h-=2;if(x==='SHADOW')G.l?G.l--:G.h-=2;if(x==='LANTERN')G.l++;G.s+=10+G.f;G.f++;G.msg=x;G.doors=[roll(),roll()];A.beep(800);if(G.h<=0)return over(G.s,'DOOR CLOSED')}E.hud.textContent=`FLOOR ${G.f} · HP ${G.h} · KEY ${G.k} · LIGHT ${G.l} · SCORE ${G.s}`;eat()}function dd(){base();text(G.msg,450,90,24,'center','#ffc94c');[0,1].forEach(i=>{let x=i?540:230;c.strokeStyle=i===G.ch?'#e6a813':'#777';c.lineWidth=i===G.ch?5:2;c.strokeRect(x,150,130,285);c.strokeRect(x+16,174,98,235);text(G.doors[i],x+65,475,17,'center',i===G.ch?'#ffc94c':'#aaa')})}
function sc(){G={life:3,combo:0,s:0,j:0,t:3.5,sym:'',req:'',msg:'',just:new Set()};coin()}function coin(){let a=[['SUN','ACCEPT'],['MOON','REJECT'],['EYE','BLESS'],['CRACK','CURSE'],['CROWN','ACCEPT'],['MASK','CURSE']],x=a[Math.random()*a.length|0];G.sym=x[0];G.req=x[1];G.t=Math.max(1.2,3.5-G.j*.04);G.msg=''}function judge(x){G.j++;if(x===G.req){G.combo++;G.s+=10+G.combo;G.msg='CORRECT';A.beep(1100)}else{G.combo=0;G.life--;G.msg=`NEEDED ${G.req}`;A.beep(170)}if(G.life<=0)return over(G.s,'FORTUNE DUE');setTimeout(()=>S.run&&coin(),260)}function uc(dt){G.t-=dt;if(G.t<=0){G.life--;if(G.life<=0)return over(G.s,'FORTUNE DUE');coin()}if(!G.msg){if(press('ArrowLeft'))judge('REJECT');if(press('ArrowRight'))judge('ACCEPT');if(press('KeyA'))judge('BLESS');if(press('KeyB'))judge('CURSE')}E.hud.textContent=`LIVES ${G.life} · COMBO ${G.combo} · SCORE ${G.s}`;eat()}function dc(){base();text(G.msg||'JUDGE THE COIN',450,90,24,'center',G.msg?'#ffc94c':'#eee9dc');c.strokeStyle='#eee9dc';c.lineWidth=6;c.beginPath();c.arc(450,290,110,0,7);c.stroke();text(G.sym,450,310,42,'center');c.strokeStyle='#ffffff22';c.strokeRect(260,465,380,18);c.fillStyle='#e6a813';c.fillRect(262,467,376*Math.max(0,G.t/3.5),14);text('← REJECT',90,520,15);text('A BLESS',330,520,15);text('B CURSE',570,520,15);text('ACCEPT →',810,520,15,'right')}
document.addEventListener('keydown',e=>{if(['ArrowLeft','ArrowRight','ArrowUp','ArrowDown'].includes(e.code))e.preventDefault();if(!S.keys.has(e.code))G.just?.add(e.code);S.keys.add(e.code);if(E.game.classList.contains('open')){if(e.code==='Escape'||e.code==='KeyM')exit();else if(e.code==='Enter'&&!S.run)begin();else if(e.code==='KeyP'){S.pause=!S.pause;E.gs.textContent=S.pause?'PAUSED':'RUNNING'}}else if(E.modal.classList.contains('open')){if(e.code==='Escape'||e.code==='KeyB')close()}else{if(e.code==='ArrowLeft')sel(S.i-1);if(e.code==='ArrowRight')sel(S.i+1);if(e.code==='Enter'||e.code==='KeyA')open();if(e.code==='KeyF')document.fullscreenElement?document.exitFullscreen():document.documentElement.requestFullscreen()}});document.addEventListener('keyup',e=>S.keys.delete(e.code));setInterval(()=>$('#clock').textContent=new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}),1000);cards();setTimeout(()=>{$('#boot').classList.add('hide');toast('DAYBREAK OS READY','Five built-in worlds available.')},2200);window.onresize=render})();
